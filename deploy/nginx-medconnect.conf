# MedConnect — Nginx como proxy inverso hacia la app Node (127.0.0.1:5000)
#
# Instalación típica (Ubuntu/Debian):
#   sudo cp deploy/nginx-medconnect.conf /etc/nginx/sites-available/medconnect
#   sudo ln -sf /etc/nginx/sites-available/medconnect /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Antes: en docker-compose.yml usa "127.0.0.1:5000:5000" para que la app no quede expuesta
#        directamente a Internet (ver docs/VPS_DEMOSTRACION.md).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    # Sustituye por tu dominio cuando uses HTTPS en otro bloque o certbot --nginx
    server_name _;

    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
        proxy_buffering off;
    }
}

